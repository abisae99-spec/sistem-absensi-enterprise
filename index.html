    function TabCuti({ simulateAutoSave, globalKebijakanCuti, setGlobalKebijakanCuti, globalCutiBersama, setGlobalCutiBersama, globalEmployees, setGlobalEmployees }) {
      const [cbForm, setCbForm] = useState({ tglMulai: '', tglSelesai: '', desc: '' });
      const [cbEditIndex, setCbEditIndex] = useState(null);

      const handleSaveCutiBersama = (i) => {
        if(!cbForm.tglMulai || !cbForm.tglSelesai || !cbForm.desc) return alert("Lengkapi data cuti bersama!");
        const days = Math.ceil((new Date(cbForm.tglSelesai) - new Date(cbForm.tglMulai)) / (1000 * 60 * 60 * 24)) + 1;
        if (days < 1) return alert("Tanggal selesai harus lebih besar dari tanggal mulai!");

        const updatedCb = [...globalCutiBersama]; const oldDays = updatedCb[i].hari;
        updatedCb[i] = { tglMulai: cbForm.tglMulai, tglSelesai: cbForm.tglSelesai, hari: days, desc: cbForm.desc };
        setGlobalCutiBersama(updatedCb);
        
        if (days !== oldDays) {
           const diff = days - oldDays; const updatedEmps = globalEmployees.map(emp => ({...emp, sisaCuti: emp.sisaCuti - diff}));
           setGlobalEmployees(updatedEmps);
        }
        setCbForm({ tglMulai: '', tglSelesai: '', desc: '' }); setCbEditIndex(null); simulateAutoSave();
      };

      const deleteCutiBersama = (index) => {
         const toDelete = globalCutiBersama[index];
         if(toDelete.hari > 0 && window.confirm(`Membatalkan cuti bersama ini akan mengembalikan saldo cuti seluruh karyawan sebanyak ${toDelete.hari} hari. Lanjutkan?`)){
           setGlobalCutiBersama(globalCutiBersama.filter((_, i) => i !== index));
           const updatedEmps = globalEmployees.map(emp => ({...emp, sisaCuti: emp.sisaCuti + toDelete.hari}));
           setGlobalEmployees(updatedEmps); simulateAutoSave();
         } else { setGlobalCutiBersama(globalCutiBersama.filter((_, i) => i !== index)); simulateAutoSave(); }
      }

      return (
        <div className="space-y-6">
          <GlassCard className="p-6 space-y-4 animate-fade-in-up">
             <div className="flex justify-between items-center border-b border-black/5 pb-4 mb-4"><h3 className="text-xs font-black uppercase text-[#0070BA] dark:text-[#00F0FF] tracking-widest">Kebijakan Cuti Global</h3><button onClick={simulateAutoSave} className="p-2 bg-[#0070BA]/10 text-[#0070BA] dark:bg-[#00F0FF]/10 dark:text-[#00F0FF] rounded-xl"><Save size={16} /></button></div>
             <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/20 dark:bg-black/20 p-5 rounded-2xl border border-black/5">
                <div className="space-y-4">
                  <InputGroup label="Mulai Periode Cuti" type="date" value={globalKebijakanCuti.tglMulai} onChange={e => {setGlobalKebijakanCuti({...globalKebijakanCuti, tglMulai: e.target.value}); simulateAutoSave();}} />
                  <InputGroup label="Akhir Periode Cuti (Hangus)" type="date" value={globalKebijakanCuti.tglSelesai} onChange={e => {setGlobalKebijakanCuti({...globalKebijakanCuti, tglSelesai: e.target.value}); simulateAutoSave();}} />
                </div>
                <div className="space-y-6 flex flex-col justify-center">
                  <label className="flex items-center gap-3 cursor-pointer group">
                    <div onClick={() => {setGlobalKebijakanCuti({...globalKebijakanCuti, prorata: !globalKebijakanCuti.prorata}); simulateAutoSave();}}>{globalKebijakanCuti.prorata ? <CheckSquare size={24} className="text-teal-500" /> : <XCircle size={24} className="text-gray-400" />}</div>
                    <div className="flex flex-col"><span className="text-[10px] font-bold text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest">Prorata Karyawan Baru</span><span className="text-[9px] text-gray-500">Hitung proporsional jika masa kerja &lt; 1 tahun</span></div>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer group">
                    <div onClick={() => {setGlobalKebijakanCuti({...globalKebijakanCuti, minus: !globalKebijakanCuti.minus}); simulateAutoSave();}}>{globalKebijakanCuti.minus ? <CheckSquare size={24} className="text-rose-500" /> : <XCircle size={24} className="text-gray-400" />}</div>
                    <div className="flex flex-col"><span className="text-[10px] font-bold text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest">Izinkan Saldo Minus</span><span className="text-[9px] text-gray-500">Kelebihan cuti memotong jatah tahun depan</span></div>
                  </label>
                </div>
             </div>
          </GlassCard>

          <GlassCard className="p-6 space-y-4 animate-fade-in-up">
              <div className="flex justify-between items-center border-b border-black/5 pb-4 mb-4">
                 <h3 className="text-xs font-black uppercase text-[#0070BA] dark:text-[#00F0FF] tracking-widest">Jadwal Cuti Bersama</h3>
                 <div className="flex gap-2"><button onClick={simulateAutoSave} className="p-2 bg-teal-100 text-teal-600 rounded-xl" title="Simpan Tabel"><Save size={16} /></button><button onClick={() => { setGlobalCutiBersama([{ id: Date.now(), tglMulai: '', tglSelesai: '', hari: 0, desc: '' }, ...globalCutiBersama]); setCbEditIndex(0); setCbForm({ tglMulai: '', tglSelesai: '', desc: '' }); }} className="p-2 bg-[#0070BA]/10 text-[#0070BA] rounded-xl border border-[#0070BA]/20"><Plus size={16} /></button></div>
              </div>
              <div className="overflow-x-auto rounded-xl border border-black/5">
                 <table className="w-full text-left whitespace-nowrap text-[10px] md:text-xs"><thead className="bg-white/40 dark:bg-[#0A1128] text-gray-500 uppercase tracking-widest"><tr><th className="p-4">Tgl Mulai</th><th className="p-4">Tgl Selesai</th><th className="p-4">Jumlah Hari</th><th className="p-4 w-1/3">Keterangan</th><th className="p-4 text-center">Aksi</th></tr></thead><tbody className="font-bold text-[#134E4A] dark:text-white">
                      {globalCutiBersama.map((cb, i) => (
                        <tr key={cb.id || i} className="border-b border-black/5 hover:bg-white/5">
                          <td className="p-4 font-mono text-[#0070BA] dark:text-[#00F0FF]">{cbEditIndex === i ? <input type="date" value={cbForm.tglMulai} onChange={e=>setCbForm({...cbForm, tglMulai: e.target.value})} className="bg-transparent border-b border-[#0070BA] outline-none" autoFocus/> : formatIndoDate(cb.tglMulai)}</td>
                          <td className="p-4 font-mono text-[#0070BA] dark:text-[#00F0FF]">{cbEditIndex === i ? <input type="date" value={cbForm.tglSelesai} onChange={e=>setCbForm({...cbForm, tglSelesai: e.target.value})} className="bg-transparent border-b border-[#0070BA] outline-none"/> : formatIndoDate(cb.tglSelesai)}</td>
                          <td className="p-4 text-rose-500">- {cbEditIndex === i ? '?' : cb.hari} Hari</td>
                          <td className="p-4 opacity-70">{cbEditIndex === i ? <input type="text" value={cbForm.desc} onChange={e=>setCbForm({...cbForm, desc: e.target.value})} className="w-full bg-transparent border-b border-[#0070BA] outline-none"/> : cb.desc}</td>
                          <td className="p-4 align-middle">
                             <div className="flex justify-center w-full">
                                {cbEditIndex === i ? <div className="flex gap-2"><button onClick={() => handleSaveCutiBersama(i)} className="p-1.5 bg-teal-100 text-teal-600 rounded"><Check size={14}/></button><button onClick={() => {if(cb.hari===0)deleteCutiBersama(i); setCbEditIndex(null);}} className="p-1.5 bg-rose-100 text-rose-600 rounded"><XCircle size={14}/></button></div> : <ActionButtons onEdit={() => { setCbEditIndex(i); setCbForm(cb); }} onDelete={() => deleteCutiBersama(i)} />}
                             </div>
                          </td>
                        </tr>
                      ))}
                      {globalCutiBersama.length === 0 && <tr><td colSpan="5" className="p-6 text-center text-gray-500 font-bold uppercase text-[10px]">Belum ada data</td></tr>}
                    </tbody></table>
               </div>
          </GlassCard>
        </div>
      );
    }

    function TabAkses({ simulateAutoSave, matrixData, setMatrixData, passData, setPassData }) {
      const [editingModId, setEditingModId] = useState(null); const [modName, setModName] = useState("");
      const toggleMatrix = (id, role) => { setMatrixData(matrixData.map(m => m.id === id ? { ...m, [role]: !m[role] } : m)); simulateAutoSave(); };
      const [passForm, setPassForm] = useState({ id: '', level: '', nama: '', user: '', pass: '' }); const [editPassId, setEditPassId] = useState(null);

      const mxCols = ['u','s','m','t','a'];

      return (
        <div className="space-y-6">
          <GlassCard className="p-6">
            <div className="flex justify-between items-center border-b border-[#0070BA]/10 pb-4 mb-4"><h3 className="text-xs font-black uppercase text-[#0070BA] dark:text-[#00F0FF] tracking-widest">Matriks Otorisasi Akses Modul</h3><div className="flex gap-2"><button onClick={simulateAutoSave} className="p-2 bg-teal-100 text-teal-600 rounded-xl"><Save size={16} /></button><button onClick={() => { const newId = Date.now(); setMatrixData([{ id: newId, mod: 'Modul Baru', u: false, s: false, m: false, t: false, a: false }, ...matrixData]); setEditingModId(newId); setModName('Modul Baru'); }} className="p-2 bg-[#0070BA]/10 text-[#0070BA] rounded-xl"><Plus size={16} /></button></div></div>
            <div className="overflow-x-auto rounded-xl border border-black/5 dark:border-white/5 custom-scrollbar">
              <table className="w-full text-left whitespace-nowrap text-[10px] md:text-xs"><thead className="bg-white/40 dark:bg-[#0A1128] uppercase tracking-wider text-gray-500"><tr><th className="p-4 sticky left-0 z-10 bg-white/90 dark:bg-[#0A1128]">Nama Modul / Fitur</th><th className="p-4 text-center">User</th><th className="p-4 text-center">Supervisor</th><th className="p-4 text-center">Manager</th><th className="p-4 text-center">Top Man.</th><th className="p-4 text-center text-[#0070BA] dark:text-[#00F0FF]">Admin</th><th className="p-4 text-center">Aksi</th></tr></thead><tbody className="font-bold text-[#134E4A] dark:text-white">
                    {matrixData.map((row) => (
                      <tr key={row.id} className="border-b border-black/5 dark:border-white/5 hover:bg-white/5">
                        <td className="p-4 sticky left-0 z-10 bg-white/90 dark:bg-[#0A1128] border-r border-black/5 opacity-80">{editingModId === row.id ? (<input type="text" value={modName} onChange={(e) => setModName(e.target.value)} className="w-full bg-transparent border-b border-[#0070BA] outline-none" autoFocus />) : row.mod}</td>
                        {mxCols.map(c => <td key={c} className="p-4 text-center cursor-pointer" onClick={() => toggleMatrix(row.id, c)}>{row[c] ? <CheckCircle size={16} className="mx-auto text-teal-500 hover:scale-125 transition-transform" /> : <XCircle size={16} className="mx-auto text-rose-300 opacity-50" />}</td>)}
                        <td className="p-4 align-middle">
                           <div className="flex justify-center w-full">
                              {editingModId === row.id ? (<div className="flex gap-2"><button onClick={() => { setMatrixData(matrixData.map(m => m.id === row.id ? {...m, mod: modName} : m)); setEditingModId(null); simulateAutoSave(); }} className="p-1.5 bg-teal-100 text-teal-600 rounded hover:bg-teal-200 transition-colors" title="Simpan"><Check size={14}/></button><button onClick={() => setEditingModId(null)} className="p-1.5 bg-rose-100 text-rose-600 rounded hover:bg-rose-200 transition-colors" title="Batal"><XCircle size={14}/></button></div>) : (<ActionButtons onEdit={() => { setEditingModId(row.id); setModName(row.mod); }} onDelete={() => { setMatrixData(matrixData.filter(m => m.id !== row.id)); simulateAutoSave(); }} />)}
                           </div>
                        </td>
                      </tr>
                    ))}
                  </tbody></table>
            </div>
          </GlassCard>
          <GlassCard className="p-6">
            <div className="flex justify-between items-center border-b border-[#0070BA]/10 pb-4 mb-4"><h3 className="text-xs font-black uppercase text-[#0070BA] dark:text-[#00F0FF] tracking-widest">Informasi Default Password</h3><div className="flex gap-2"><button onClick={simulateAutoSave} className="p-2 bg-teal-100 text-teal-600 rounded-xl"><Save size={16} /></button><button onClick={() => { setPassData([{ id: Date.now(), level: '', nama: '', user: '', pass: '' }, ...passData]); setEditPassId(Date.now()); }} className="p-2 bg-[#0070BA]/10 text-[#0070BA] rounded-xl"><Plus size={16} /></button></div></div>
            <div className="overflow-x-auto rounded-xl border border-black/5 dark:border-white/5 custom-scrollbar">
               <table className="w-full text-left whitespace-nowrap text-[10px] md:text-xs"><thead className="bg-white/40 dark:bg-[#0A1128] uppercase tracking-wider text-gray-500"><tr><th className="p-4">Level / Role Akses</th><th className="p-4">Nama Karyawan</th><th className="p-4">Username Login</th><th className="p-4">Password Default</th><th className="p-4 text-center">Aksi</th></tr></thead><tbody className="font-bold text-[#134E4A] dark:text-white">
                     {passData.map((row) => (
                        <tr key={row.id} className="border-b border-black/5 dark:border-white/5 hover:bg-white/5">
                           <td className="p-4 text-[#0070BA] dark:text-[#00F0FF]">{editPassId === row.id ? <input type="text" value={passForm.level} onChange={e=>setPassForm({...passForm, level: e.target.value})} className="w-full bg-transparent border-b border-[#0070BA] outline-none" autoFocus /> : row.level}</td>
                           <td className="p-4 font-mono opacity-80">{editPassId === row.id ? <input type="text" value={passForm.nama} onChange={e=>setPassForm({...passForm, nama: e.target.value})} className="w-full bg-transparent border-b border-[#0070BA] outline-none" /> : row.nama}</td>
                           <td className="p-4 font-mono opacity-80">{editPassId === row.id ? <input type="text" value={passForm.user} onChange={e=>setPassForm({...passForm, user: e.target.value})} className="w-full bg-transparent border-b border-[#0070BA] outline-none" /> : row.user}</td>
                           <td className="p-4 font-mono text-teal-600 dark:text-teal-400">{editPassId === row.id ? <input type="text" value={passForm.pass} onChange={e=>setPassForm({...passForm, pass: e.target.value})} className="w-full bg-transparent border-b border-[#0070BA] outline-none" /> : row.pass}</td>
                           <td className="p-4 align-middle">
                              <div className="flex justify-center w-full">
                                 {editPassId === row.id ? (<div className="flex gap-2"><button onClick={()=>{ setPassData(passData.map(p => p.id === row.id ? {...passForm, id: row.id} : p)); setEditPassId(null); simulateAutoSave(); }} className="p-1.5 bg-teal-100 text-teal-600 rounded"><Check size={14}/></button><button onClick={()=>setEditPassId(null)} className="p-1.5 bg-rose-100 text-rose-600 rounded"><XCircle size={14}/></button></div>) : (<ActionButtons onEdit={() => { setEditPassId(row.id); setPassForm(row); }} onDelete={() => { setPassData(passData.filter(p => p.id !== row.id)); simulateAutoSave(); }} />)}
                              </div>
                           </td>
                        </tr>
                     ))}
                     {passData.length === 0 && <tr><td colSpan="5" className="p-6 text-center text-gray-500 font-bold uppercase text-[10px]">Data kosong</td></tr>}
                  </tbody></table>
            </div>
          </GlassCard>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
