    // --- HELPER FUNCTIONS ---
    const calculateDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371e3; const rad = Math.PI / 180;
      const a = Math.sin((lat2 - lat1) * rad / 2) ** 2 + Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin((lon2 - lon1) * rad / 2) ** 2;
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    };
    const formatTime = (date) => {
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const ss = String(date.getSeconds()).padStart(2, '0');
      return `${hh}:${mm}:${ss}`;
    };
    const formatDate = (date) => {
      const d = typeof date === 'string' ? new Date(date) : date;
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    };
    const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(number || 0);
    
    const formatIndoDate = (dateStr) => { 
        if (!dateStr || dateStr === '-') return '-'; let str = String(dateStr); 
        if (str.includes('/')) { const p = str.split('/'); return p[0].length === 4 ? `${p[2]}/${p[1]}/${p[0]}` : str; }
        if (str.includes('T')) str = str.split('T')[0]; if (str.includes(' ')) str = str.split(' ')[0];
        const p = str.split('-'); return p.length === 3 ? `${p[2].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[0]}` : str; 
    };
    const formatSheetTime = (val) => { if (!val) return ''; let strVal = String(val); if (strVal.includes('T')) { const timePart = strVal.split('T')[1]; if (timePart) return timePart.substring(0, 5); } return strVal; };

    const getAttendanceStatus = (time, type, shiftStr = '08:00 - 17:00') => {
      const totalMins = time.getHours() * 60 + time.getMinutes();
      const [sIn, sOut] = shiftStr.split('-').map(t => t.trim());
      const toMins = (t) => { const [h, m] = t.split(':').map(Number); return (h || 0) * 60 + (m || 0); };
      
      if (type === 'IN') {
        const sInM = toMins(sIn);
        const diff = totalMins - sInM;
        if (diff <= 0) return { status: 'Sangat Hadir', color: 'text-emerald-600 dark:text-emerald-400' };
        if (diff > 0 && diff <= 120) return { status: 'Telat', color: 'text-amber-500 dark:text-amber-400' };
        return { status: 'Sangat Telat', color: 'text-rose-600 dark:text-rose-500' };
      } else {
        const sOutM = toMins(sOut);
        const diffOut = sOutM - totalMins;
        if (diffOut > 0 && diffOut <= 300) return { status: 'Pulang Awal', color: 'text-amber-500 dark:text-amber-400' }; // Maksimal 5 Jam (300 Menit)
        if (diffOut > 300) return { status: 'Absen', color: 'text-rose-600 dark:text-rose-500' }; // Lebih awal dari 5 Jam dianggap Absen/Tidak Valid
        if (totalMins <= sOutM + 90) return { status: 'Normal', color: 'text-[#0070BA] dark:text-cyan-400' };
        return { status: 'Lembur', color: 'text-purple-600 dark:text-fuchsia-400' };
      }
    };

    const cleanTimeStr = (t) => {
      if (!t || t === '-' || String(t).trim() === '') return '-';
      
      if (typeof t === 'string' && t.includes('T') && t.includes('Z')) {
          const d = new Date(t);
          if (!isNaN(d.getTime())) {
              const hh = String(d.getHours()).padStart(2, '0');
              const mm = String(d.getMinutes()).padStart(2, '0');
              const ss = String(d.getSeconds()).padStart(2, '0');
              return `${hh}:${mm}:${ss}`;
          }
      }

      let str = String(t).trim();
      if (str.includes('T')) { const timePart = str.split('T')[1]; if(timePart) str = timePart; }
      str = str.replace(/\./g, ':');
      const parts = str.split(':');
      if (parts.length >= 2) { 
          const hh = parts[0].replace(/\D/g, '').slice(-2).padStart(2, '0'); 
          const mm = parts[1].replace(/\D/g, '').slice(0, 2).padStart(2, '0'); 
          const ss = parts.length >= 3 ? parts[2].replace(/\D/g, '').slice(0, 2).padStart(2, '0') : '00';
          return `${hh}:${mm}:${ss}`; 
      }
      return str;
    };

    const toHHMM = (m) => m <= 0 ? '-' : `${String(Math.floor(m/60)).padStart(2, '0')}:${String(m%60).padStart(2, '0')}`;

    const calculateTimes = (shift, checkIn, checkOut) => {
      const cin = cleanTimeStr(checkIn); const cout = cleanTimeStr(checkOut);
      const [sIn, sOut] = (shift || '08:00 - 17:00').split('-').map(t => t.trim()); 
      const toMins = (t) => { const [h, m] = t.split(':').map(Number); return (h || 0) * 60 + (m || 0); };
      const sInM = toMins(sIn); const sOutM = toMins(sOut); 
      
      let telatM = 0; let telatStr = '-';
      if (cin && cin !== '-') {
          const aInM = toMins(cin);
          telatM = aInM > sInM ? aInM - sInM : 0;
          telatStr = telatM > 0 ? toHHMM(telatM) : '-';
      }

      let awalM = 0; let lemburM = 0; let kerjaM = 0;
      let awalStr = '-'; let lemburStr = '-'; let kerjaStr = '-';

      if (cout && cout !== '-') {
          const aOutM = toMins(cout);
          awalM = aOutM < sOutM ? sOutM - aOutM : 0;
          lemburM = aOutM > sOutM ? aOutM - sOutM : 0;
          awalStr = awalM > 0 ? toHHMM(awalM) : '-';
          lemburStr = lemburM > 0 ? toHHMM(lemburM) : '-';
          
          if (cin && cin !== '-') {
              const aInM = toMins(cin);
              kerjaM = aOutM - aInM;
              if (kerjaM < 0) kerjaM = 0;
              kerjaStr = kerjaM > 0 ? toHHMM(kerjaM) : '-';
          }
      }

      return { kerja: kerjaStr, telat: telatStr, awal: awalStr, lembur: lemburStr, telatMins: telatM, lemburMins: lemburM };
    };

    const getDisplayKeterangan = (row, globalRequests) => {

    function DashboardScreen({ user, globalAttendance, globalRequests, globalEmployees, setGlobalPreviewPhoto }) {
      const [time, setTime] = useState(new Date());
      const [startDate, setStartDate] = useState(''); const [endDate, setEndDate] = useState('');

      useEffect(() => { 
        const today = new Date(); const dayOfWeek = today.getDay() || 7; 
        const monday = new Date(today); monday.setDate(today.getDate() - dayOfWeek + 1);
        const saturday = new Date(monday); saturday.setDate(monday.getDate() + 5);
        setStartDate(monday.toISOString().split('T')[0]); setEndDate(saturday.toISOString().split('T')[0]);
        const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); 
      }, []);

      const filteredData = globalAttendance.filter(item => {
        if (String(item.id).toUpperCase() !== String(user?.id).toUpperCase()) return false;
        if (!startDate && !endDate) return true;
        const itemDate = new Date(item.date); const start = startDate ? new Date(startDate) : new Date(-8640000000000000); const end = endDate ? new Date(endDate) : new Date(8640000000000000);
        return itemDate >= start && itemDate <= end;
      });

    function AttendanceScreen({ user, onBack, onRecordAbsen }) {
      const [attendanceType, setAttendanceType] = useState('IN'); const [method, setMethod] = useState('barcode');
      const [locationName, setLocationName] = useState('Melacak posisi GPS...'); const [distance, setDistance] = useState(0);
      const [currentCoord, setCurrentCoord] = useState({ lat: 0, lng: 0 });
      const [isProcessing, setIsProcessing] = useState(false); const [result, setResult] = useState(null); const [capturedPhoto, setCapturedPhoto] = useState(null);
      const [outOfRadiusWarning, setOutOfRadiusWarning] = useState(false);
      const [qrWarning, setQrWarning] = useState(false);
      const videoRef = useRef(null); const topRef = useRef(null); const [currentTime, setCurrentTime] = useState(new Date());

      useEffect(() => { const t = setInterval(() => setCurrentTime(new Date()), 1000); return () => clearInterval(t); }, []);
      useEffect(() => { if (topRef.current) topRef.current.scrollIntoView({ behavior: 'smooth' }); }, []);
      
      useEffect(() => { 
         if (!("geolocation" in navigator)) return;
         let watchId = navigator.geolocation.watchPosition(async (pos) => { 
            const lat = pos.coords.latitude; const lng = pos.coords.longitude; setCurrentCoord({ lat, lng }); setDistance(calculateDistance(lat, lng, OFFICE_COORD.lat, OFFICE_COORD.lng)); 
            try {
               const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`);
               const data = await res.json(); 
               let locStr = data.display_name;
               if (data.address) {
                 const addr = data.address;
                 const building = addr.building || addr.amenity || addr.office; 
                 const road = addr.road || addr.street; 
                 const village = addr.village || addr.suburb || addr.neighbourhood;
                 const district = addr.city_district || addr.county;
                 const city = addr.city || addr.town || addr.municipality; 
                 let parts = []; 
                 if (building) parts.push(building); 
                 if (road) parts.push(road); 
                 if (village) parts.push(village);
                 if (district) parts.push(district);
                 if (city) parts.push(city);
                 if (parts.length > 0) locStr = parts.join(', ');
                 else locStr = data.display_name;
               } setLocationName(locStr);
            } catch(e) { setLocationName(`Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`); }
         }, (err) => { setDistance(0); setLocationName('Akses GPS Gagal / Ditolak'); }, { enableHighAccuracy: true, maximumAge: 0 }); 
         return () => navigator.geolocation.clearWatch(watchId);

      useEffect(() => { if (distance > RADIUS_TOLERANCE_METERS && method === 'barcode') { setMethod('selfie'); setOutOfRadiusWarning(true); setTimeout(() => setOutOfRadiusWarning(false), 6000); } }, [distance, method]);

      useEffect(() => {
        let currentStream;
        const initCamera = async () => {
          if (!capturedPhoto && navigator.mediaDevices) {
            try { const constraints = { video: { facingMode: method === 'selfie' ? 'user' : 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } }; currentStream = await navigator.mediaDevices.getUserMedia(constraints); if (videoRef.current) videoRef.current.srcObject = currentStream; } 
            catch (err) { try { currentStream = await navigator.mediaDevices.getUserMedia({ video: true }); if (videoRef.current) videoRef.current.srcObject = currentStream; } catch (e) {} }
          }
        };
        initCamera(); return () => { if (currentStream) currentStream.getTracks().forEach(t => t.stop()); };
      }, [method, capturedPhoto]);

      useEffect(() => {
        let checkTimer;
        if (method === 'barcode' && distance <= RADIUS_TOLERANCE_METERS && !result && !isProcessing) {
          checkTimer = setInterval(async () => {
            if (videoRef.current && videoRef.current.readyState === 4) {
              try {
                let detectedCode = null;
                if ('BarcodeDetector' in window) {
                  const detector = new window.BarcodeDetector();
                  const barcodes = await detector.detect(videoRef.current);
                  if (barcodes.length > 0) {
                    detectedCode = barcodes[0].rawValue || barcodes[0].rawData?.toString();
                  }
                }

                if (!detectedCode && window.jsQR) {
                  const canvas = document.createElement('canvas');
                  const context = canvas.getContext('2d', { willReadFrequently: true });
                  canvas.width = videoRef.current.videoWidth;
                  canvas.height = videoRef.current.videoHeight;
                  context.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
                  const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                  const code = window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
                  if (code && code.data) {
                    detectedCode = code.data;
                  }
                }

                if (detectedCode) {
                  const normalized = String(detectedCode).trim().toUpperCase();
                  if (normalized === 'ABSENSI-SAE' || normalized.includes('ABSENSI-SAE')) {
                    clearInterval(checkTimer);
                    handleAction();
                    return;
                  }

                  setQrWarning(true);

              }
            }
          }, 250);
        }
        return () => clearInterval(checkTimer);
      }, [method, distance, result, attendanceType, isProcessing]);

      const capturePhoto = () => { 
         if (videoRef.current) { 
            const c = document.createElement('canvas'); 
            const videoWidth = videoRef.current.videoWidth;
            const videoHeight = videoRef.current.videoHeight;
            const size = Math.min(videoWidth, videoHeight);
            
            c.width = size; c.height = size; 
            const ctx = c.getContext('2d'); 
            
            const startX = (videoWidth - size) / 2;
            const startY = (videoHeight - size) / 2;

            if (method === 'selfie') { ctx.translate(size, 0); ctx.scale(-1, 1); } 
            
            ctx.drawImage(videoRef.current, startX, startY, size, size, 0, 0, size, size); 
            
            if (method === 'selfie') {
               ctx.setTransform(1, 0, 0, 1, 0, 0); 
               const rectHeight = 60; 
               ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; 
               ctx.fillRect(0, size - rectHeight, size, rectHeight); 
               ctx.fillStyle = 'white'; 
               ctx.textAlign = 'center'; 
               ctx.font = 'bold 16px sans-serif'; 
               const dayName = currentTime.toLocaleDateString('id-ID', {weekday: 'long'});

            }
            setCapturedPhoto(c.toDataURL('image/jpeg', 0.4));

      };
      
      const handleAction = async () => {

         if (onRecordAbsen) onRecordAbsen(newAbsenPayload);

      };

      if (result) return (

            <div className="w-20 h-20 bg-[#0070BA]/10 dark:bg-[#00F0FF]/20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_rgba(0,112,186,0.3)]"><CheckCircle className="text-[#0070BA] dark:text-[#00F0FF]" size={40} /></div>
            <h2 className="text-2xl font-black text-[#134E4A] dark:text-white mb-2 uppercase tracking-widest">BERHASIL TEREKAM</h2><p className="text-[#0070BA] dark:text-[#00F0FF] text-[10px] font-bold tracking-[0.2em] mb-8">LAPORAN KEHADIRAN</p>
            <div className="space-y-4 text-left bg-white/40 dark:bg-black/20 p-5 rounded-2xl mb-8">
               <div className="flex justify-between items-center border-b border-black/5 pb-2"><span className="text-[10px] font-bold text-gray-500 uppercase">Waktu Absen</span><span className="text-sm font-mono font-black text-[#134E4A] dark:text-white">{result.time}</span></div>
               <div className="flex justify-between items-center border-b border-black/5 pb-2"><span className="text-[10px] font-bold text-gray-500 uppercase">Status</span><span className={`text-sm font-black uppercase ${result.color}`}>{result.status}</span></div>
               <div className="flex justify-between gap-4 pb-2"><span className="text-[10px] font-bold text-gray-500 uppercase shrink-0">Lokasi Tercatat</span><span className="text-[10px] font-bold text-[#134E4A] dark:text-white text-right line-clamp-2">{result.locName}</span></div>
            </div>
            <Button variant="outline" className="w-full" onClick={onBack}>KEMBALI KE DASHBOARD</Button>
          </GlassCard>
        </div>
      );

      return (
        <div ref={topRef} className="max-w-2xl mx-auto space-y-4 animate-fade-in-up pt-2 pb-10">
          {outOfRadiusWarning && (
             <div className="bg-rose-100 dark:bg-[#FF003C]/20 border border-rose-500 text-rose-600 dark:text-[#FF003C] p-4 rounded-2xl text-[10px] md:text-xs font-bold flex items-center gap-3 shadow-md animate-pulse"><AlertTriangle size={20} className="shrink-0" /><p>Anda berada di luar radius kantor (&gt;100m). Mode dialihkan otomatis ke Dinas Luar (Selfie).</p></div>
          )}
          {qrWarning && (
             <div className="bg-amber-100 dark:bg-amber-500/20 border border-amber-500 text-amber-600 dark:text-amber-400 p-4 rounded-2xl text-[10px] md:text-xs font-bold flex items-center gap-3 shadow-md animate-pulse"><AlertTriangle size={20} className="shrink-0" /><p>Barcode tidak valid! Pastikan memindai QR Code absensi resmi perusahaan (ABSENSI-SAE).</p></div>

          <div className="flex p-1.5 bg-white/50 dark:bg-[#0A1128] border border-[#0070BA]/20 dark:border-[#00F0FF]/20 rounded-[1.5rem] shadow-inner relative overflow-hidden h-[60px]">
            <div className={`absolute top-1.5 bottom-1.5 w-[calc(50%-6px)] bg-gradient-to-r ${attendanceType==='IN'?'from-[#0070BA] to-[#004080] dark:from-[#00F0FF] dark:to-[#0057FF] left-1.5':'from-[#8E24AA] to-[#D81B60] dark:from-[#B026FF] dark:to-[#FF003C] left-[calc(50%+4.5px)]'} rounded-[1.2rem] transition-all duration-500 z-0`}></div>

                 <div className="w-[80%] h-[60%] max-w-[350px] max-h-[350px] rounded-3xl border-4 border-[#00F0FF] shadow-[0_0_0_9999px_rgba(0,0,0,0.6)] relative overflow-hidden"><div className="absolute top-0 left-0 w-full h-1 bg-[#00F0FF] shadow-[0_0_15px_3px_#00F0FF] animate-[scan_2s_ease-in-out_infinite]"></div></div>

              </div>

            {method === 'selfie' && !capturedPhoto && (

    function LeaveFormScreen({ user, onSubmitLeave }) {
      const [jenis, setJenis] = useState('Izin Terlambat'); const [tglMulai, setTglMulai] = useState(''); const [tglSelesai, setTglSelesai] = useState(''); const [lamaHari, setLamaHari] = useState(0); const [alasan, setAlasan] = useState(''); const [bukti, setBukti] = useState(null); const [isSubmitting, setIsSubmitting] = useState(false); const [errorMsg, setErrorMsg] = useState(''); const [successMsg, setSuccessMsg] = useState(false); const [isDocCameraOpen, setIsDocCameraOpen] = useState(false); const docVideoRef = useRef(null);

      useEffect(() => { if (tglMulai && tglSelesai) { const diff = Math.ceil((new Date(tglSelesai) - new Date(tglMulai)) / (1000 * 60 * 60 * 24)) + 1; setLamaHari(diff > 0 ? diff : 0); } else { setLamaHari(0); } }, [tglMulai, tglSelesai]);

      useEffect(() => {
        let stream;
        if (isDocCameraOpen) { navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => { stream = s; if (docVideoRef.current) docVideoRef.current.srcObject = s; }).catch(() => { alert("Kamera tidak dapat diakses."); setIsDocCameraOpen(false); }); }
        return () => { if (stream) stream.getTracks().forEach(t => t.stop()); }
      }, [isDocCameraOpen]);

      const captureDocPhoto = () => { 
        if (docVideoRef.current) { 
            const c = document.createElement('canvas'); 
            const MAX_WIDTH = 320; 
            const scaleSize = MAX_WIDTH / docVideoRef.current.videoWidth; 
            c.width = MAX_WIDTH; 
            c.height = docVideoRef.current.videoHeight * scaleSize; 
            c.getContext('2d').drawImage(docVideoRef.current, 0, 0, c.width, c.height); 
            setBukti(c.toDataURL('image/jpeg', 0.25)); 
            setIsDocCameraOpen(false); 
        } 
      };

      const handleSubmit = async () => { 
          setErrorMsg(''); setSuccessMsg(false); 
          if (!tglMulai || !tglSelesai || !alasan) return setErrorMsg("Mohon lengkapi Tanggal dan Alasan!"); 
          if (lamaHari <= 0) return setErrorMsg("Tanggal pengajuan tidak valid!");
          if (jenis === 'Sakit' && !bukti) return setErrorMsg("Foto Dokumen (Surat Dokter) wajib dilampirkan untuk pengajuan Sakit.");

          setIsSubmitting(true); 
          setTimeout(() => { 
              onSubmitLeave({ idReq: Date.now(), id: user?.id || 'EMP', nama: user?.name || 'User', jenis: jenis, tglMulai: tglMulai, tglSelesai: tglSelesai, tgl: `${formatIndoDate(tglMulai)} s/d ${formatIndoDate(tglSelesai)}`, alasan: alasan, status: 'Pending', dokumen: bukti || '' }); 
              setSuccessMsg(true); setIsSubmitting(false); setTglMulai(''); setTglSelesai(''); setAlasan(''); setBukti(null); 
              setTimeout(() => setSuccessMsg(false), 4000); 
          }, 1500); 
      };

      return (
        <div className="max-w-3xl mx-auto space-y-6 pt-2 pb-10 animate-fade-in-up">
          <GlassCard className="p-6 md:p-8 space-y-6">
             <InputGroup label="Jenis Pengajuan" type="select" options={['Izin Terlambat','Izin Tidak Masuk','Sakit','Cuti Tahunan','Lembur']} value={jenis} onChange={e=>setJenis(e.target.value)} />
             <div className="grid grid-cols-1 md:grid-cols-3 gap-4 bg-white/20 dark:bg-black/20 p-4 rounded-xl border border-black/5">
                <InputGroup label="Tgl Mulai *" type="date" value={tglMulai} onChange={e=>setTglMulai(e.target.value)} />
                <InputGroup label="Tgl Selesai *" type="date" value={tglSelesai} onChange={e=>setTglSelesai(e.target.value)} />
                <div className="space-y-1.5 md:space-y-2 w-full"><label className="block text-[9px] md:text-[10px] font-bold text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest">Jumlah Hari</label><input type="text" value={`${lamaHari} Hari`} disabled className="w-full p-3 md:p-3.5 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-gray-500 text-[10px] md:text-xs font-bold" /></div>
             </div>
             <div className="space-y-2"><label className="text-[10px] font-bold text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest">Alasan Lengkap *</label><textarea rows="4" value={alasan} onChange={e=>setAlasan(e.target.value)} className="w-full p-4 bg-white/50 dark:bg-[#0A1128]/80 border border-[#0070BA]/20 rounded-2xl outline-none text-[#134E4A] dark:text-white text-xs"></textarea></div>
             <div className="space-y-2 mt-4">
                <label className="block text-[10px] font-bold text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest mb-2">Foto Dokumen {jenis === 'Sakit' ? <span className="text-rose-500">(Wajib)</span> : ''}</label>
                {!isDocCameraOpen && !bukti ? (
                  <button type="button" onClick={() => setIsDocCameraOpen(true)} className="w-full flex flex-col items-center justify-center bg-white/20 dark:bg-black/20 py-8 rounded-2xl border border-black/10 dark:border-white/10 border-dashed hover:bg-[#0070BA]/5 dark:hover:bg-[#00F0FF]/5 transition-all group outline-none gap-3">
                    <div className="w-14 h-14 bg-[#0070BA]/10 dark:bg-[#00F0FF]/10 text-[#0070BA] dark:text-[#00F0FF] rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><Camera size={28} /></div>
                    <span className="text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-widest">Buka Kamera</span>
                  </button>
                ) : isDocCameraOpen ? (<div className="bg-white/20 dark:bg-black/20 p-4 rounded-xl border border-black/5 flex flex-col items-center gap-4"><div className="w-full h-[300px] rounded-xl overflow-hidden relative bg-black"><video ref={docVideoRef} autoPlay playsInline className="w-full h-full object-cover" /><div className="absolute inset-0 border-2 border-dashed border-white/50 m-4 rounded-lg pointer-events-none"></div></div><div className="flex gap-2 w-full"><Button variant="outline" onClick={() => setIsDocCameraOpen(false)} className="flex-1">Batal</Button><Button onClick={captureDocPhoto} className="flex-[2]"><Camera size={16}/> Ambil Foto</Button></div></div>) : (<div className="bg-white/20 dark:bg-black/20 p-4 rounded-xl border border-black/5 flex flex-col items-center gap-4"><img src={bukti} alt="Dokumen" className="w-full max-h-[300px] object-contain rounded-xl border border-black/10" /><Button variant="outline" onClick={() => { setBukti(null); setIsDocCameraOpen(true); }} className="w-full"><RefreshCw size={16}/> Foto Ulang</Button></div>)}
             </div>
             {errorMsg && <div className="p-3 bg-rose-100 text-rose-600 rounded-xl text-xs font-bold">{errorMsg}</div>}
             {successMsg && <div className="p-3 bg-teal-100 text-teal-600 rounded-xl text-xs font-bold">Pengajuan Berhasil Dikirim!</div>}
             <Button variant="primary" className="w-full" onClick={handleSubmit} disabled={isSubmitting}>{isSubmitting ? 'MENGIRIM PENGAJUAN...' : 'KIRIM PENGAJUAN'}</Button>
          </GlassCard>
        </div>
      );
    }

    function ReportsScreen({ role, user, globalAttendance, globalRequests, globalEmployees, uiSettings, payrollLabels, activeTab, setActiveTab, setGlobalPreviewPhoto }) {
      const [searchQuery, setSearchQuery] = useState('');
      const today = new Date(); const curYear = today.getFullYear(); const curMonth = String(today.getMonth() + 1).padStart(2, '0');
      const [slipPeriod, setSlipPeriod] = useState(`${curYear}-${curMonth}`); 
      const [startDate, setStartDate] = useState(''); const [endDate, setEndDate] = useState('');
      
      useEffect(() => {
        if (activeTab === 'slip' && slipPeriod) {
          const [yearStr, monthStr] = slipPeriod.split('-'); let year = parseInt(yearStr, 10); let month = parseInt(monthStr, 10);
          let prevMonth = month - 1; let prevYear = year; if (prevMonth === 0) { prevMonth = 12; prevYear -= 1; }
          setStartDate(`${prevYear}-${String(prevMonth).padStart(2, '0')}-21`); setEndDate(`${year}-${String(month).padStart(2, '0')}-20`);
        } else if (activeTab !== 'slip') { setStartDate(''); setEndDate(''); }
      }, [slipPeriod, activeTab]);

      const [statusFilter, setStatusFilter] = useState('Semua'); const [approveFilter, setApproveFilter] = useState('Semua');
      const [selectedSlipEmp, setSelectedSlipEmp] = useState(user?.role === 'user' ? user.id : '');

      useEffect(() => {
        if (!selectedSlipEmp && globalEmployees.length > 0) {
          setSelectedSlipEmp(user?.role === 'user' ? user.id : globalEmployees[0].id);
        }
      }, [globalEmployees, user, selectedSlipEmp]);

      const filterData = (dataArray, dateField) => {
        return dataArray.filter(item => {
          const matchSearch = role === 'user' ? item.id === user.id : (String(item.nama || '').toLowerCase().includes(searchQuery.toLowerCase()) || String(item.id || '').toLowerCase().includes(searchQuery.toLowerCase()));
          const matchStatus = statusFilter === 'Semua' || item.status.toLowerCase() === statusFilter.toLowerCase();
          const matchApprove = approveFilter === 'Semua' || item.status === approveFilter;
          let matchDate = true;
          if (startDate || endDate) {
            const itemDate = new Date(item[dateField]); const start = startDate ? new Date(startDate) : new Date(-8640000000000000); const end = endDate ? new Date(endDate) : new Date(8640000000000000);
            matchDate = itemDate >= start && itemDate <= end;
          }
          if(activeTab === 'cuti') return matchSearch && matchDate && matchApprove;
          return matchSearch && matchDate && matchStatus;
        });
      };

      const filteredAbsensi = filterData(globalAttendance, 'date'); 
      const filteredCuti = filterData(globalRequests, 'tglMulai').filter(r => r.jenis.toLowerCase().includes('cuti'));

      const handleExportExcel = () => {
        let tableHTML = '<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><table border="1">';
        if (activeTab === 'absensi') {
            tableHTML += `<thead><tr><th style="background-color:#0070BA; color:white;">Tanggal</th><th style="background-color:#0070BA; color:white;">Hari</th><th style="background-color:#0070BA; color:white;">Nama Karyawan</th><th style="background-color:#0070BA; color:white;">Departemen</th><th style="background-color:#0070BA; color:white;">Jabatan</th><th style="background-color:#0070BA; color:white;">Jam Kerja</th><th style="background-color:#0070BA; color:white;">Check In</th><th style="background-color:#0070BA; color:white;">Check Out</th><th style="background-color:#0070BA; color:white;">Lokasi</th><th style="background-color:#0070BA; color:white;">Waktu Kerja</th><th style="background-color:#0070BA; color:white;">Telat</th><th style="background-color:#0070BA; color:white;">Pulang Awal</th><th style="background-color:#0070BA; color:white;">Lembur</th><th style="background-color:#0070BA; color:white;">Status</th><th style="background-color:#0070BA; color:white;">Keterangan</th></tr></thead><tbody>`;
            filteredAbsensi.forEach(r => { 
                const empInfo = globalEmployees?.find(e => String(e.id).toUpperCase() === String(r.id).toUpperCase()) || {};
                tableHTML += `<tr><td>${formatIndoDate(r.displayDate)}</td><td>${r.day}</td><td>${r.nama}</td><td>${empInfo.dept||'-'}</td><td>${empInfo.jabatan||'-'}</td><td>${r.shift}</td><td>${r.checkIn}</td><td>${r.checkOut}</td><td>${r.loc}</td><td>${r.kerja}</td><td>${r.telat}</td><td>${r.awal}</td><td>${r.lembur}</td><td>${r.status}</td><td>${getDisplayKeterangan(r, globalRequests)}</td></tr>`; 
            });
        } else if (activeTab === 'uang') {
            tableHTML += `<thead><tr><th style="background-color:#0070BA; color:white;">Tanggal</th><th style="background-color:#0070BA; color:white;">Hari</th><th style="background-color:#0070BA; color:white;">Nama Karyawan</th><th style="background-color:#0070BA; color:white;">Departemen</th><th style="background-color:#0070BA; color:white;">Jabatan</th><th style="background-color:#0070BA; color:white;">Jam Kerja</th><th style="background-color:#0070BA; color:white;">Check In</th><th style="background-color:#0070BA; color:white;">Check Out</th><th style="background-color:#0070BA; color:white;">Waktu Kerja</th><th style="background-color:#0070BA; color:white;">Telat</th><th style="background-color:#0070BA; color:white;">Pulang Awal</th><th style="background-color:#0070BA; color:white;">Lembur</th><th style="background-color:#0070BA; color:white;">Uang Makan</th><th style="background-color:#0070BA; color:white;">Uang Lembur</th><th style="background-color:#0070BA; color:white;">Status</th><th style="background-color:#0070BA; color:white;">Keterangan</th></tr></thead><tbody>`;
            filteredAbsensi.forEach(r => { 
                const empInfo = globalEmployees?.find(e => String(e.id).toUpperCase() === String(r.id).toUpperCase()) || {};
                tableHTML += `<tr><td>${formatIndoDate(r.displayDate)}</td><td>${r.day}</td><td>${r.nama}</td><td>${empInfo.dept||'-'}</td><td>${empInfo.jabatan||'-'}</td><td>${r.shift}</td><td>${r.checkIn}</td><td>${r.checkOut}</td><td>${r.kerja}</td><td>${r.telat}</td><td>${r.awal}</td><td>${r.lembur}</td><td>${r.uangMakan || 0}</td><td>${r.uangLembur || 0}</td><td>${r.status}</td><td>${getDisplayKeterangan(r, globalRequests)}</td></tr>`; 
            });
        } else if (activeTab === 'cuti') {
            tableHTML += '<thead><tr><th style="background-color:#0070BA; color:white;">Tanggal Mulai</th><th style="background-color:#0070BA; color:white;">Tanggal Selesai</th><th style="background-color:#0070BA; color:white;">Nama Karyawan</th><th style="background-color:#0070BA; color:white;">Departemen</th><th style="background-color:#0070BA; color:white;">Jabatan</th><th style="background-color:#0070BA; color:white;">Jumlah Hari</th><th style="background-color:#0070BA; color:white;">Sisa Cuti</th><th style="background-color:#0070BA; color:white;">Keterangan</th><th style="background-color:#0070BA; color:white;">Approval</th></tr></thead><tbody>';
            filteredCuti.forEach(r => { 
                const empInfo = globalEmployees?.find(e => String(e.id).toUpperCase() === String(r.id).toUpperCase()) || {};
                tableHTML += `<tr><td>${formatIndoDate(r.tglMulai)}</td><td>${formatIndoDate(r.tglSelesai)}</td><td>${r.nama}</td><td>${empInfo.dept||'-'}</td><td>${empInfo.jabatan||'-'}</td><td>${r.lamaHari || '-'}</td><td>${empInfo.sisaCuti || '-'}</td><td>${r.alasan}</td><td>${r.status}</td></tr>`; 
            });
        }
        tableHTML += '</tbody></table></body></html>';
        const blob = new Blob([tableHTML], { type: 'application/vnd.ms-excel' }); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = `Laporan_${activeTab}.xls`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const handleExportPDF = () => {
         if(activeTab === 'slip') {
             const emp = globalEmployees.find(e => e.id === selectedSlipEmp);
             if (!emp) return alert("Silakan pilih karyawan terlebih dahulu!");
             if (!window.html2pdf) return alert("Library PDF sedang dimuat, coba lagi.");
             const element = document.getElementById('slip-gaji-print'); 
             const opt = { margin: 0.5, filename: `Slip_Gaji_${emp.nama.replace(/\s+/g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }; 
             window.html2pdf().set(opt).from(element).save();
         } else { 
             if (!window.html2pdf) return alert("Library PDF sedang dimuat, coba lagi.");
             const element = document.getElementById('report-table-print'); 
             const opt = { margin: 0.5, filename: `Laporan_${activeTab}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }; 
             window.html2pdf().set(opt).from(element).save();
         }
      };

      return (
        <div className="space-y-4 md:space-y-6 animate-fade-in-up pb-10">
          <div className="md:hidden grid grid-cols-2 gap-2 bg-white/40 dark:bg-[#0A1128]/50 p-2 rounded-2xl border border-black/5">
             {[ {id:'absensi', label:'Absensi'}, {id:'uang', label:'Uang Makan'}, {id:'cuti', label:'Cuti'}, {id:'slip', label:'Slip Gaji'} ].map(t => (
                <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex items-center justify-center py-2.5 text-[10px] md:text-xs font-bold tracking-widest uppercase transition-all rounded-xl ${activeTab === t.id ? 'bg-gradient-to-r from-[#0070BA] to-[#004080] dark:from-[#00F0FF] dark:to-[#B026FF] text-white shadow-md' : 'text-gray-500 hover:bg-white/50'}`}>{t.label}</button>
             ))}
          </div>

          <GlassCard className="p-4 flex flex-col gap-4">
            {activeTab === 'slip' ? (
               <div className="flex flex-col gap-4 w-full">
                 <div className="flex flex-col sm:flex-row gap-4 w-full justify-between items-start sm:items-center border-b border-black/5 dark:border-white/5 pb-4">
                     {role !== 'user' ? (
                       <select value={selectedSlipEmp} onChange={e=>setSelectedSlipEmp(e.target.value)} className="p-2.5 bg-white/60 dark:bg-[#111827] border border-[#0070BA]/20 rounded-xl text-[10px] md:text-xs outline-none w-full sm:flex-1 font-bold text-[#134E4A] dark:text-white shadow-sm min-w-0">
                          <option value="">-- Pilih Karyawan --</option>
                          {globalEmployees.map(e => <option key={e.id} value={e.id}>{e.nama} ({e.id})</option>)}
                       </select>
                     ) : <div className="hidden sm:block sm:flex-1"></div>}
                     <button onClick={handleExportPDF} className="w-full sm:w-[200px] flex items-center justify-center gap-2 px-6 py-2.5 bg-gradient-to-r from-[#00A86B] to-[#0070BA] text-white rounded-xl text-[10px] md:text-xs font-bold uppercase tracking-widest shadow-md shrink-0 whitespace-nowrap">
                        <Download size={16}/> Cetak PDF
                     </button>
                 </div>
                 <div className="flex flex-col sm:flex-row gap-4 w-full justify-between items-start sm:items-center">
                   <input type="month" value={slipPeriod} onChange={e=>setSlipPeriod(e.target.value)} className="p-2.5 bg-white/60 dark:bg-[#111827] border border-[#0070BA]/20 rounded-xl text-[10px] md:text-xs outline-none w-full sm:flex-1 font-bold text-[#134E4A] dark:text-white shadow-sm min-w-0" title="Periode Bulan/Tahun" />
                   <div className="flex items-center gap-2 bg-white/40 dark:bg-[#111827]/50 p-1.5 rounded-xl border border-black/5 w-full sm:flex-[2] overflow-hidden shadow-sm shrink-0">
                      <span className="text-[9px] md:text-[10px] font-bold text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest ml-2 hidden sm:inline whitespace-nowrap">Tutup Buku:</span>
                      <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="bg-transparent px-1 py-1 text-[10px] md:text-xs text-[#134E4A] dark:text-white outline-none w-full min-w-0 font-bold text-center" title="Mulai" />
                      <span className="text-gray-500 font-bold shrink-0">-</span>
                      <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="bg-transparent px-1 py-1 text-[10px] md:text-xs text-[#134E4A] dark:text-white outline-none w-full min-w-0 font-bold text-center" title="Sampai Dengan" />
                   </div>
                 </div>
               </div>
            ) : (
               <div className="flex flex-col xl:flex-row gap-4 items-start xl:items-center justify-between w-full">
                  <div className="flex flex-wrap items-center gap-3 w-full xl:w-auto flex-1">
                      {role !== 'user' && (
                        <div className="relative w-full sm:w-[220px] shrink-0">
                          <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-[#0070BA] dark:text-[#00F0FF]" size={16} />
                          <input type="text" placeholder="Cari Nama..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-white/60 dark:bg-[#111827] border border-[#0070BA]/20 rounded-xl text-[10px] md:text-xs outline-none" />
                        </div>
                      )}
                      
                      <div className="flex items-center gap-2 w-full sm:w-auto bg-white/40 dark:bg-[#111827]/50 p-1.5 rounded-xl border border-black/5 shrink-0">
                        <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="bg-transparent px-2 py-1 text-[10px] md:text-xs text-[#134E4A] dark:text-white outline-none w-[110px]" />
                        <span className="text-gray-500 font-bold">-</span>
                        <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="bg-transparent px-2 py-1 text-[10px] md:text-xs text-[#134E4A] dark:text-white outline-none w-[110px]" />
                      </div>

                      {(activeTab === 'absensi' || activeTab === 'uang') && (
                        <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="p-2.5 bg-white/60 dark:bg-[#111827] border border-[#0070BA]/20 rounded-xl text-[10px] md:text-xs outline-none w-full sm:w-auto shrink-0">
                           <option value="Semua">Semua Status</option><option value="Sangat Hadir">Sangat Hadir</option><option value="Hadir">Hadir</option><option value="Telat">Telat</option><option value="Sangat Telat">Sangat Telat</option><option value="Lembur">Lembur</option><option value="Sakit">Sakit</option><option value="Izin">Izin</option><option value="Cuti">Cuti</option><option value="Absen">Absen</option>
                        </select>
                      )}

                      {activeTab === 'cuti' && (
                        <select value={approveFilter} onChange={e=>setApproveFilter(e.target.value)} className="p-2.5 bg-white/60 dark:bg-[#111827] border border-[#0070BA]/20 rounded-xl text-[10px] md:text-xs outline-none w-full sm:w-auto shrink-0">
                           <option value="Semua">Semua Approval</option><option value="Pending">Pending</option><option value="Approved">Disetujui</option><option value="Rejected">Ditolak</option>
                        </select>
                      )}
                  </div>

                  <div className="flex gap-2 w-full xl:w-auto justify-end shrink-0 mt-2 xl:mt-0">
                     <button onClick={handleExportExcel} className="flex-1 xl:flex-none flex items-center justify-center gap-2 px-5 py-2.5 bg-[#0070BA]/10 text-[#0070BA] dark:bg-[#00F0FF]/10 dark:text-[#00F0FF] rounded-xl text-[10px] md:text-xs font-bold uppercase tracking-widest"><FileDown size={16}/> Excel</button>
                     {activeTab !== 'slip' && <button onClick={handleExportPDF} className="flex-1 xl:flex-none flex items-center justify-center gap-2 px-5 py-2.5 bg-gradient-to-r from-[#00A86B] to-[#0070BA] text-white rounded-xl text-[10px] md:text-xs font-bold uppercase tracking-widest shadow-md"><Download size={16}/> PDF</button>}
                  </div>
               </div>
            )}
          </GlassCard>

          {['absensi', 'uang'].includes(activeTab) && (
            <GlassCard className="p-0 overflow-hidden" id="report-table-print">
               <div className="overflow-x-auto w-full custom-scrollbar bg-white/5 dark:bg-white/0 p-4">
                 <table className="w-full text-left whitespace-nowrap text-[10px] md:text-xs min-w-[max-content] border-collapse">
                   <thead className="bg-white/40 dark:bg-[#0A1128] text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest sticky top-0 z-10 shadow-sm border-b border-black/5">
                     <tr>
                        <th className="p-4">Tanggal</th><th className="p-4">Hari</th><th className="p-4">Nama Karyawan</th>
                        <th className="p-4">Departemen</th><th className="p-4">Jabatan</th><th className="p-4">Jam Kerja</th>
                        <th className="p-4 text-center">Check In</th><th className="p-4 text-center">Check Out</th>
                        {activeTab === 'absensi' && <th className="p-4">Lokasi</th>}
                        <th className="p-4 text-center">Waktu Kerja</th><th className="p-4 text-center text-amber-500">Telat</th>
                        <th className="p-4 text-center text-amber-500">Pulang Awal</th><th className="p-4 text-center text-purple-500">Lembur</th>
                        {activeTab === 'uang' && <th className="p-4 text-right text-emerald-500">Uang Makan</th>}
                        {activeTab === 'uang' && <th className="p-4 text-right text-purple-500">Uang Lembur</th>}
                        <th className="p-4 text-center">Status</th>
                        {activeTab === 'absensi' && <th className="p-4 text-center">Foto</th>}
                        <th className="p-4">Keterangan</th>
                     </tr>
                   </thead>
                   <tbody className="font-bold text-[#134E4A] dark:text-white">
                     {filteredAbsensi.length > 0 ? (
                        filteredAbsensi.map((row, i) => {
                            const empInfo = globalEmployees?.find(e => String(e.id).toUpperCase() === String(row.id).toUpperCase()) || {};
                            return (
                            <tr key={i} className="border-b border-[#0070BA]/5 dark:border-white/5 hover:bg-white/50 dark:hover:bg-[#00F0FF]/5 transition-colors">
                              <td className="p-3 md:p-4 text-[10px] md:text-xs font-mono text-gray-600 dark:text-gray-300 align-middle">{row.displayDate}</td>

                              {activeTab === 'uang' && <td className="p-3 md:p-4 text-right font-mono text-purple-600 dark:text-purple-400 align-middle">{formatRupiah(row.uangLembur || 0)}</td>}

                                    {row.foto ? <button onClick={(e)=>{ e.stopPropagation(); setGlobalPreviewPhoto(row.foto); }} className="text-[#0070BA] dark:text-[#00F0FF] hover:scale-110 transition-transform"><Camera size={16}/></button> : <span className="text-gray-400">-</span>}
                                 </div>
                              </td>}
                              <td className="p-3 md:p-4 text-[10px] md:text-xs text-gray-500 font-bold truncate max-w-[250px] align-middle">{getDisplayKeterangan(row, globalRequests)}</td>
                            </tr>
                          )})
                     ) : (<tr><td colSpan="17" className="p-8 text-center text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-widest">Tidak ada data.</td></tr>)}
                   </tbody>
                 </table>
               </div>
            </GlassCard>
          )}

          {activeTab === 'cuti' && (
            <GlassCard className="p-0 overflow-hidden" id="report-table-print">
               <div className="overflow-x-auto w-full custom-scrollbar bg-white/5 dark:bg-white/0 p-4">
                 <table className="w-full text-left whitespace-nowrap text-[10px] md:text-xs min-w-[max-content] border-collapse">
                   <thead className="bg-white/40 dark:bg-[#0A1128] text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest sticky top-0 z-10 shadow-sm border-b border-black/5">
                     <tr><th className="p-4">Tanggal Mulai</th><th className="p-4">Tanggal Selesai</th><th className="p-4">Karyawan</th><th className="p-4">Departemen</th><th className="p-4">Jabatan</th><th className="p-4 text-center">Jumlah Hari</th><th className="p-4 text-center">Sisa Cuti</th><th className="p-4">Keterangan</th><th className="p-4 text-center">Approval</th></tr>
                   </thead>
                   <tbody className="font-bold text-[#134E4A] dark:text-white">
                     {filteredCuti.length > 0 ? filteredCuti.map((r,i) => {
                        const empInfo = globalEmployees?.find(e => String(e.id).toUpperCase() === String(r.id).toUpperCase()) || {};
                        return (<tr key={i} className="border-b border-black/5 hover:bg-white/5"><td className="p-4 font-mono align-middle">{formatIndoDate(r.tglMulai)}</td><td className="p-4 font-mono align-middle">{formatIndoDate(r.tglSelesai)}</td><td className="p-4 align-middle">{r.nama}</td><td className="p-4 opacity-70 align-middle">{empInfo.dept || '-'}</td><td className="p-4 opacity-70 align-middle">{empInfo.jabatan || '-'}</td><td className="p-4 text-center text-rose-500 font-bold align-middle">{r.lamaHari} Hari</td><td className="p-4 text-center text-teal-600 font-bold align-middle">{empInfo.sisaCuti || '-'} Hari</td><td className="p-4 truncate max-w-[300px] opacity-70 align-middle">{r.alasan}</td><td className="p-4 align-middle"><div className="flex justify-center w-full"><span className={`text-[9px] font-black uppercase border px-2 py-1 rounded ${r.status==='Approved'?'text-teal-600 border-teal-300':r.status==='Rejected'?'text-rose-600 border-rose-300':'text-amber-600 border-amber-300'}`}>{r.status}</span></div></td></tr>);
                     }) : <tr><td colSpan="9" className="p-8 text-center text-gray-500 uppercase tracking-widest text-[10px]">Data tidak ditemukan</td></tr>}
                   </tbody>
                 </table>
               </div>
            </GlassCard>
          )}

          {activeTab === 'slip' && (
            <div className="w-full overflow-x-auto p-4 md:p-8 custom-scrollbar bg-gray-100/50 dark:bg-[#0A1128]/50 rounded-2xl">
              {globalEmployees.find(e => e.id === selectedSlipEmp) ? (
                <div className="w-[800px] min-w-[800px] max-w-[800px] mx-auto bg-white p-10 text-gray-800 shadow-xl relative" id="slip-gaji-print" style={{fontFamily: 'sans-serif'}}>
                    <div className="flex justify-between items-center border-b-2 border-gray-300 pb-6 mb-6">
                       <div>
                           <h2 className="text-2xl font-black text-[#0070BA] uppercase tracking-wider">{uiSettings.companyName}</h2>
                       </div>
                       <div className="text-right">
                           <h1 className="text-3xl font-black text-[#0070BA] tracking-widest uppercase">SLIP GAJI</h1>
                           <p className="text-sm font-bold text-gray-600 mt-1">Periode: {slipPeriod ? new Date(slipPeriod + '-01').toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }) : ''}</p>
                           <p className="text-xs font-bold text-gray-500 mt-1">Tutup Buku: {formatIndoDate(startDate)} - {formatIndoDate(endDate)}</p>
                       </div>
                    </div>
                    <div className="mb-8 text-sm">
                      <table className="text-[#134E4A] font-bold">
                        <tbody>
                          <tr><td className="text-gray-500 pr-4 pb-2">Nama Karyawan</td><td className="pb-2">: {globalEmployees.find(e => e.id === selectedSlipEmp)?.nama}</td></tr>
                          <tr><td className="text-gray-500 pr-4 pb-2">Jabatan</td><td className="pb-2">: {globalEmployees.find(e => e.id === selectedSlipEmp)?.jabatan}</td></tr>
                          <tr><td className="text-gray-500 pr-4 pb-2">Departemen</td><td className="pb-2">: {globalEmployees.find(e => e.id === selectedSlipEmp)?.dept}</td></tr>
                        </tbody>
                      </table>
                    </div>
                    
                    {(() => {
                      const emp = globalEmployees.find(e => e.id === selectedSlipEmp);
                      const totalAbsen = globalAttendance.filter(a => a.id === emp.id && a.status.toUpperCase() === 'ABSEN' && new Date(a.date) >= (startDate?new Date(startDate):new Date(-8.64e15)) && new Date(a.date) <= (endDate?new Date(endDate):new Date(8.64e15))).length;
                      const finalPAbsen = emp.pAbsen > 0 ? emp.pAbsen : Math.round((emp.gapok / 30) * totalAbsen);
                      const pendapatan = Number(emp.gapok)+Number(emp.tMakan)+Number(emp.tJabatan)+Number(emp.tTransport)+Number(emp.tThr)+Number(emp.tKes)+Number(emp.insentif);
                      const potongan = Number(emp.pAsuransi)+Number(emp.pBpjsKs)+Number(emp.pBpjstk)+Number(emp.pPinjam)+Number(finalPAbsen)+Number(emp.pLain);
                      const thp = pendapatan - potongan;
                      return (
                        <>
                          <div className="grid grid-cols-2 gap-10 mb-8">
                             <div>
                                <h4 className="text-sm font-black text-teal-600 border-b border-teal-200 pb-2 mb-3 uppercase tracking-widest">Pendapatan</h4>
                                <div className="space-y-3 text-xs">
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.gapok}</span><span className="font-bold">{formatRupiah(emp.gapok)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.tMakan}</span><span className="font-bold">{formatRupiah(emp.tMakan)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.tJabatan}</span><span className="font-bold">{formatRupiah(emp.tJabatan)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.tTransport}</span><span className="font-bold">{formatRupiah(emp.tTransport)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.tThr}</span><span className="font-bold">{formatRupiah(emp.tThr)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.tKes}</span><span className="font-bold">{formatRupiah(emp.tKes)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.insentif}</span><span className="font-bold">{formatRupiah(emp.insentif)}</span></div>
                                </div>
                                <div className="flex justify-between border-t border-teal-200 mt-4 pt-3"><span className="font-black text-teal-700 text-sm">Total Pendapatan</span><span className="font-black text-teal-700 text-sm">{formatRupiah(pendapatan)}</span></div>
                             </div>
                             <div>
                                <h4 className="text-sm font-black text-rose-600 border-b border-rose-200 pb-2 mb-3 uppercase tracking-widest">Potongan</h4>
                                <div className="space-y-3 text-xs">
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.pAsuransi}</span><span className="font-bold">{formatRupiah(emp.pAsuransi)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.pBpjsKs}</span><span className="font-bold">{formatRupiah(emp.pBpjsKs)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.pBpjstk}</span><span className="font-bold">{formatRupiah(emp.pBpjstk)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.pPinjam}</span><span className="font-bold">{formatRupiah(emp.pPinjam)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.pAbsen}</span><span className="font-bold">{formatRupiah(finalPAbsen)}</span></div>
                                  <div className="flex justify-between"><span className="text-gray-600">{payrollLabels.pLain}</span><span className="font-bold">{formatRupiah(emp.pLain)}</span></div>
                                </div>
                                <div className="flex justify-between border-t border-rose-200 mt-4 pt-3"><span className="font-black text-rose-700 text-sm">Total Potongan</span><span className="font-black text-rose-700 text-sm">{formatRupiah(potongan)}</span></div>
                             </div>
                          </div>
                          <div className="bg-[#0070BA]/5 border border-[#0070BA]/20 rounded-xl p-6 flex justify-between items-center mb-10"><span className="text-sm font-black uppercase tracking-widest text-[#0070BA]">Penerimaan Bersih (THP)</span><span className="text-2xl font-black font-mono text-[#0070BA]">{formatRupiah(thp)}</span></div>
                          <div className="grid grid-cols-2 gap-4 text-center pt-8 text-xs"><div><p className="text-gray-500 mb-16">Penerima,</p><p className="font-bold text-[#134E4A] underline">{emp.nama}</p></div><div><p className="text-gray-500 mb-16">Mengetahui,</p><p className="font-bold text-[#134E4A] underline">{uiSettings.hrdName || 'HRD Manager'}</p><p className="text-[9px] text-gray-500">{uiSettings.hrdTitle || 'HR & GA'}</p></div></div>
                        </>
                      );
                    })()}
                </div>
              ) : (
                <GlassCard className="mt-4 p-10 flex flex-col items-center justify-center min-h-[300px]">
                  <FileText size={48} className="text-[#0070BA]/20 mb-4" />
                  <span className="text-gray-500 font-bold uppercase tracking-widest text-xs">Silakan pilih karyawan untuk melihat preview Slip Gaji</span>
                </GlassCard>
              )}
            </div>
          )}
        </div>
      );
    }

    function SettingsScreen({ role, activeTab, setActiveTab, globalRequests, setGlobalRequests, onApprovalDecision, onDeleteRequest, onUpdateReq, uiSettings, setUiSettings, globalEmployees, setGlobalEmployees, globalJabatan, setGlobalJabatan, globalDepartemen, setGlobalDepartemen, payrollLabels, setPayrollLabels, globalJadwal, setGlobalJadwal, globalUangMakan, setGlobalUangMakan, globalLembur, setGlobalLembur, globalLibur, setGlobalLibur, globalKebijakanCuti, setGlobalKebijakanCuti, globalCutiBersama, setGlobalCutiBersama, globalMatrixData, setGlobalMatrixData, globalPassData, setGlobalPassData, setGlobalPreviewPhoto }) {
      const allowedTabs = SETTINGS_TABS.filter(t => t.roles.includes(role));
      const [triggerSave, setTriggerSave] = useState(0);
      const saveStatus = useAutoSave(triggerSave);
      
      const dataRef = useRef();
      useEffect(() => {
        dataRef.current = { globalEmployees, uiSettings, payrollLabels, globalJabatan, globalDepartemen, globalJadwal, globalUangMakan, globalLembur, globalLibur, globalKebijakanCuti, globalCutiBersama, globalMatrixData, globalPassData };
      }, [globalEmployees, uiSettings, payrollLabels, globalJabatan, globalDepartemen, globalJadwal, globalUangMakan, globalLembur, globalLibur, globalKebijakanCuti, globalCutiBersama, globalMatrixData, globalPassData]);

      useEffect(() => {
         if (triggerSave === 0) return;
         const timer = setTimeout(() => {
            const cd = dataRef.current;
            const syncPayload = {
                karyawan: cd.globalEmployees, jabatan: cd.globalJabatan, departemen: cd.globalDepartemen,
                jamkerja: cd.globalJadwal, cutibersama: cd.globalCutiBersama, akses: cd.globalMatrixData,
                login: cd.globalPassData, linas: cd.globalLibur, setting: { uiSettings: cd.uiSettings, payrollLabels: cd.payrollLabels, globalUangMakan: cd.globalUangMakan, globalLembur: cd.globalLembur, globalKebijakanCuti: cd.globalKebijakanCuti }
            };
            sendDataToSheet({ action: 'SYNC_ALL_SETTINGS', data: syncPayload });
         }, 1000); 
         return () => clearTimeout(timer);
      }, [triggerSave]);

      const simulateAutoSave = () => setTriggerSave(prev => prev + 1);

      if (allowedTabs.length === 0) {
        return (
           <div className="flex h-[70vh] items-center justify-center animate-fade-in-up">
              <GlassCard className="p-8 text-center max-w-sm w-full flex flex-col items-center border-t-4 border-amber-500">
                 <div className="w-16 h-16 bg-amber-100 dark:bg-amber-500/20 rounded-full flex items-center justify-center mb-4"><Shield className="text-amber-500" size={32}/></div>
                 <h2 className="text-lg font-black text-[#134E4A] dark:text-white uppercase tracking-widest mb-2">Akses Terbatas</h2>
                 <p className="text-[10px] md:text-xs font-bold text-gray-500">Anda tidak memiliki hak akses untuk melihat pengaturan.</p>
              </GlassCard>
           </div>
        );
      }

      return (
        <div className="max-w-7xl mx-auto space-y-6 pt-2 pb-10 animate-fade-in-up">
          <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 ${saveStatus === 'idle' ? 'opacity-0 -translate-y-10' : 'opacity-100 translate-y-0'}`}>
            <div className="px-6 py-2 bg-teal-100 dark:bg-[#0A1128]/90 text-teal-600 dark:text-[#00F0FF] rounded-full font-bold text-[10px] uppercase tracking-widest border border-teal-200 dark:border-[#00F0FF]/30 backdrop-blur shadow-lg flex items-center gap-2"><RefreshCw size={14} className={saveStatus === 'saving' ? "animate-spin" : "hidden"} />{saveStatus === 'saving' ? 'Menyimpan...' : 'Tersimpan Otomatis'}</div>
          </div>

          <div className="md:hidden grid grid-cols-2 gap-2 bg-blue-50/60 dark:bg-[#0A1128]/60 p-2 rounded-2xl border border-blue-200/50 dark:border-blue-900/50 mb-2 shadow-inner">
            {allowedTabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-3 py-3 rounded-xl font-bold text-[9px] uppercase tracking-widest transition-all justify-center ${activeTab === tab.id ? 'bg-white dark:bg-[#111827] text-[#0070BA] dark:text-[#00F0FF] shadow-sm border border-[#0070BA]/20' : 'text-gray-500 hover:bg-white/50'}`}>
                <tab.icon size={14} /> <span className="truncate">{tab.label}</span>
              </button>
            ))}
          </div>

          <div className="transition-all duration-500 min-w-0">
            {activeTab === 'approve' && <TabApprove simulateAutoSave={simulateAutoSave} role={role} globalRequests={globalRequests} setGlobalRequests={setGlobalRequests} onApprovalDecision={onApprovalDecision} onDeleteRequest={onDeleteRequest} onUpdateReq={onUpdateReq} setGlobalPreviewPhoto={setGlobalPreviewPhoto} />}
            {activeTab === 'tampilan' && <TabTampilan simulateAutoSave={simulateAutoSave} uiSettings={uiSettings} setUiSettings={setUiSettings} />}
            {activeTab === 'master' && <TabMasterData simulateAutoSave={simulateAutoSave} globalEmployees={globalEmployees} setGlobalEmployees={setGlobalEmployees} globalJabatan={globalJabatan} setGlobalJabatan={setGlobalJabatan} globalDepartemen={globalDepartemen} setGlobalDepartemen={setGlobalDepartemen} payrollLabels={payrollLabels} setPayrollLabels={setPayrollLabels} />}
            {activeTab === 'jamkerja' && <TabJamKerja simulateAutoSave={simulateAutoSave} globalJadwal={globalJadwal} setGlobalJadwal={setGlobalJadwal} globalUangMakan={globalUangMakan} setGlobalUangMakan={setGlobalUangMakan} globalLembur={globalLembur} setGlobalLembur={setGlobalLembur} globalLibur={globalLibur} setGlobalLibur={setGlobalLibur} />}
            {activeTab === 'cuti' && <TabCuti simulateAutoSave={simulateAutoSave} globalKebijakanCuti={globalKebijakanCuti} setGlobalKebijakanCuti={setGlobalKebijakanCuti} globalCutiBersama={globalCutiBersama} setGlobalCutiBersama={setGlobalCutiBersama} globalEmployees={globalEmployees} setGlobalEmployees={setGlobalEmployees} />}
            {activeTab === 'akses' && <TabAkses simulateAutoSave={simulateAutoSave} matrixData={globalMatrixData} setMatrixData={setGlobalMatrixData} passData={globalPassData} setPassData={setGlobalPassData} />}
          </div>
        </div>
      );
    }

    function TabApprove({ simulateAutoSave, globalRequests, setGlobalRequests, onApprovalDecision, onDeleteRequest, onUpdateReq, setGlobalPreviewPhoto }) {
      const [editReqIndex, setEditReqIndex] = useState(null); const [reqForm, setReqForm] = useState({ jenis: '', alasan: '' });
      
      return (
        <GlassCard className="p-6">
          <div className="flex justify-between items-center border-b border-[#0070BA]/10 dark:border-white/10 pb-4 mb-4"><h3 className="text-xs font-black uppercase text-[#0070BA] dark:text-[#00F0FF] tracking-widest">Daftar Persetujuan</h3><button onClick={simulateAutoSave} className="p-2 bg-teal-100 text-teal-600 rounded-xl"><Save size={16} /></button></div>
          <div className="overflow-x-auto rounded-xl border border-black/5 dark:border-white/5 custom-scrollbar pb-2">
            <table className="w-full text-left whitespace-nowrap min-w-[800px]"><thead className="bg-white/40 dark:bg-[#0A1128] text-[10px] text-gray-500 uppercase tracking-widest"><tr><th className="p-4 align-middle">Karyawan</th><th className="p-4 align-middle">Jenis Pengajuan</th><th className="p-4 align-middle">Info/Tanggal</th><th className="p-4 align-middle text-center">Hari</th><th className="p-4 align-middle">Alasan</th><th className="p-4 text-center align-middle">Foto</th><th className="p-4 text-center align-middle">Approval & Aksi</th></tr></thead><tbody>
                {globalRequests.length > 0 ? globalRequests.map((req, i) => {
                  const t1 = new Date(req.tglMulai); const t2 = new Date(req.tglSelesai); const days = Math.ceil((t2-t1)/(1000*60*60*24))+1;
                  return (
                  <tr key={i} className="border-b border-black/5 dark:border-white/5 text-xs font-bold text-[#134E4A] dark:text-white hover:bg-white/50 dark:hover:bg-white/5 transition-colors">
                    <td className="p-4 align-middle"><div className="flex flex-col justify-center"><span>{req.nama}</span><span className="text-[9px] font-mono opacity-50 mt-0.5">{req.id}</span></div></td>
                    <td className="p-4 align-middle text-[#0070BA] dark:text-[#00F0FF]">{editReqIndex === i ? <input type="text" value={reqForm.jenis} onChange={e=>setReqForm({...reqForm, jenis: e.target.value})} className="w-24 bg-transparent border-b border-[#0070BA] outline-none" autoFocus /> : req.jenis}</td>
                    <td className="p-4 align-middle font-mono">{req.tgl}</td>
                    <td className="p-4 align-middle text-center text-rose-500 font-bold">{days} Hari</td>
                    <td className="p-4 align-middle opacity-70 font-normal">{editReqIndex === i ? <input type="text" value={reqForm.alasan} onChange={e=>setReqForm({...reqForm, alasan: e.target.value})} className="w-full bg-transparent border-b border-[#0070BA] outline-none" /> : <div className="truncate max-w-[200px]">{req.alasan}</div>}</td>
                    <td className="p-4 align-middle"><div className="flex items-center justify-center w-full">{req.dokumen && req.dokumen.length > 20 ? <button onClick={()=>setGlobalPreviewPhoto(req.dokumen)} className="text-[#0070BA] dark:text-[#00F0FF] hover:scale-110 transition-transform"><Camera size={16}/></button> : <span className="text-gray-400">-</span>}</div></td>
                    <td className="p-4 align-middle">
                      <div className="flex justify-center items-center gap-2 w-full">
                        <button onClick={() => { onApprovalDecision(i, 'Approved'); simulateAutoSave(); }} disabled={req.status === 'Approved'} className={`px-4 py-1.5 rounded-lg text-[9px] uppercase tracking-wider transition ${req.status === 'Approved' ? 'bg-teal-500 text-white shadow-md' : 'bg-teal-100 text-teal-600 dark:bg-teal-400/10 dark:text-teal-400 hover:bg-teal-200'}`}>Setujui</button>
                        <button onClick={() => { onApprovalDecision(i, 'Rejected'); simulateAutoSave(); }} disabled={req.status === 'Rejected'} className={`px-4 py-1.5 rounded-lg text-[9px] uppercase tracking-wider transition ${req.status === 'Rejected' ? 'bg-rose-500 text-white shadow-md' : 'bg-rose-100 text-rose-600 dark:bg-rose-400/10 dark:text-rose-400 hover:bg-rose-200'}`}>Tolak</button>
                        <div className="w-px h-4 bg-gray-300 dark:bg-gray-700 mx-1"></div>
